name: DXB Dips Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      pages:
        description: "Max pages to scrape"
        default: "50"

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape on Render
        run: |
          PAGES="${{ github.event.inputs.pages || '50' }}"
          echo "Triggering scrape for $PAGES pages..."
          curl -s -X POST \
            "https://dxbdips-api.onrender.com/api/trigger-scrape?pages=$PAGES&secret=dxbdips-scrape-2026" \
            -w "\nHTTP Status: %{http_code}\n"
          echo "Scrape triggered! Check Render logs for progress."
